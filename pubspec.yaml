name: test1
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cupertino_icons: ^1.0.8
  expandable_page_view: ^1.3.0
  smooth_page_indicator: ^2.0.1
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  assets:
    - assets/images/
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
flutter_assets:
  assets_path: assets/images/
  output_path: lib/utils/
  filename: app_assets.dart
  field_prefix: null
  ignore_comments: true
